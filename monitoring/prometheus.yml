# Prometheus Configuration for Refyne Backend

global:
  scrape_interval: 15s      # Scrape metrics every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  external_labels:
    monitor: 'refyne-backend'
    environment: 'production'  # Label for environment identification

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# Alert rules configuration
rule_files:
  - 'alerting_rules.yml'

scrape_configs:
  # Refyne Backend Metrics (Local)
  - job_name: 'refyne-backend-local'
    static_configs:
      # Use host.docker.internal for Docker on Windows/Mac to reach host
      # For Linux, use the service name from docker-compose or 172.17.0.1
      - targets: ['host.docker.internal:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s     # Scrape every 10s for detailed metrics
    scrape_timeout: 5s

  # Refyne Backend Metrics (Railway Production)
  - job_name: 'refyne-backend-railway'
    scheme: https
    static_configs:
      - targets: ['refyne-backend-production.up.railway.app']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s
    scrape_timeout: 5s

