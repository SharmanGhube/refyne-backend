<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refyne - Checkout</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        h1 {
            color: #667eea;
            margin-bottom: 1rem;
        }
        .loading {
            font-size: 1.2rem;
            color: #666;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
    <script>
        // Initialize Paddle
        Paddle.Setup({ 
            environment: 'sandbox',
            token: 'test_your_paddle_client_token' // Optional: add your Paddle client token
        });

        // Check if there's a transaction ID in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const transactionId = urlParams.get('_ptxn');

        if (transactionId) {
            // If there's a transaction ID, open the Paddle checkout
            document.addEventListener('DOMContentLoaded', () => {
                Paddle.Checkout.open({
                    transactionId: transactionId,
                    settings: {
                        displayMode: 'overlay',
                        theme: 'light',
                        successUrl: window.location.origin + '/success.html'
                    }
                });
            });
        } else {
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelector('.loading').textContent = 'No transaction found. Please create a checkout from your application.';
            });
        }
    </script>
</head>
<body>
    <div class="container">
        <h1>🚀 Refyne Checkout</h1>
        <div class="spinner"></div>
        <p class="loading">Loading payment form...</p>
    </div>
</body>
</html>
