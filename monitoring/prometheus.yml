# Prometheus Configuration for Refyne Backend

global:
  scrape_interval: 15s      # Scrape metrics every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  external_labels:
    monitor: 'refyne-backend'

# Alerting rules can be added here
rule_files:
  # - 'alerting_rules.yml'

scrape_configs:
  # Refyne Backend Metrics
  - job_name: 'refyne-backend'
    static_configs:
      - targets: ['localhost:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s     # Scrape every 10s for detailed metrics
    scrape_timeout: 5s

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s
    scrape_timeout: 5s
