services:
  - type: web
    name: refyne-backend
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: refyne-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: refyne-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: refyne-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: refyne-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: refyne-db
          property: database
      - key: DB_SSL_MODE
        value: require
      - key: REDIS_HOST
        fromService:
          name: refyne-redis
          type: keyvalue
          property: host
      - key: REDIS_PORT
        fromService:
          name: refyne-redis
          type: keyvalue
          property: port
      - key: PAYMENT_MODE
        value: mock
      - key: FRONTEND_URL
        value: https://refyne-frontend.vercel.app
      - key: FRONTEND_CHECKOUT_SUCCESS_URL
        value: https://refyne-frontend.vercel.app/subscription-success
      - key: FRONTEND_CHECKOUT_CANCEL_URL
        value: https://refyne-frontend.vercel.app/pricing
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://refyne-frontend.vercel.app,http://localhost:3000,http://localhost:3001"
      - key: GEMINI_API_KEY
        sync: false
      - key: INSTAGRAM_CLIENT_ID
        sync: false
      - key: INSTAGRAM_CLIENT_SECRET
        sync: false
      - key: INSTAGRAM_REDIRECT_URI
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: AUTO_MIGRATE
        value: "true"

  - type: keyvalue
    name: refyne-redis
    plan: free
    ipAllowList: []

databases:
  - name: refyne-db
    plan: free
