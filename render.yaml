services:
  - type: web
    name: refyne-backend
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: refyne-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: refyne-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: refyne-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: refyne-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: refyne-db
          property: database
      - key: DB_SSL_MODE
        value: require
      - key: REDIS_URL
        fromService:
          name: refyne-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
      - key: INSTAGRAM_CLIENT_ID
        sync: false
      - key: INSTAGRAM_CLIENT_SECRET
        sync: false
      - key: INSTAGRAM_REDIRECT_URI
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: AUTO_MIGRATE
        value: "true"

  - type: keyvalue
    name: refyne-redis
    plan: free
    ipAllowList: []

databases:
  - name: refyne-db
    plan: free
