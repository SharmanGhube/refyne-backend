<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paddle Checkout</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 1rem;
        }
        .loading {
            color: #666;
            font-size: 1.1rem;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
</head>
<body>
    <div class="container">
        <h1>Loading Checkout...</h1>
        <div class="spinner"></div>
        <p class="loading">Please wait while we prepare your checkout</p>
    </div>

    <script>
        // Get transaction ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const transactionId = urlParams.get('_ptxn');

        if (transactionId) {
            // Initialize Paddle
            Paddle.Environment.set('sandbox');
            Paddle.Initialize({
                token: 'test_089f1aa437f5a404d7520d12074' // Client-side token (different from API key)
            });

            // Open checkout overlay
            Paddle.Checkout.open({
                transactionId: transactionId,
                settings: {
                    successUrl: window.location.origin + '/checkout-success.html',
                    displayMode: 'overlay'
                }
            });
        } else {
            document.querySelector('.container').innerHTML = `
                <h1>Invalid Checkout Link</h1>
                <p>No transaction ID found. Please use a valid checkout link.</p>
            `;
        }
    </script>
</body>
</html>
