services:
  - type: web
    name: refyne-backend
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: refyne-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: refyne-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
      - key: INSTAGRAM_CLIENT_ID
        sync: false
      - key: INSTAGRAM_CLIENT_SECRET
        sync: false
      - key: INSTAGRAM_REDIRECT_URI
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: AUTO_MIGRATE
        value: "true"

databases:
  - name: refyne-db
    plan: free

interfaces:
  - type: redis
    name: refyne-redis
    plan: free
    ipAllowList: []
